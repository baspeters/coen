version: 2

project_name: coen

before:
  hooks:
    - go mod tidy

builds:
  - id: coen
    main: ./cmd/coen
    binary: coen
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/baspeters/coen/internal/cli.Version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: coen
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - packaging/**/*

nfpms:
  - id: coen
    package_name: coen
    ids:
      - coen
    vendor: Bas Peters
    homepage: https://github.com/baspeters/coen
    maintainer: Bas Peters <bas@baspeters.com>
    description: |-
      Lightweight, secure, self-hosted tunnel.

      A public edge and a private agent form one always-on, mutually
      authenticated (mTLS) connection that routes HTTPS and WebSocket traffic
      to a service that is not reachable from the internet.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    contents:
      - src: packaging/systemd/coen-edge.service
        dst: /usr/lib/systemd/system/coen-edge.service
      - src: packaging/systemd/coen-agent.service
        dst: /usr/lib/systemd/system/coen-agent.service
      - src: internal/cli/assets/edge.yaml
        dst: /etc/coen/edge.yaml
        type: config|noreplace
        file_info:
          mode: 0640
      - src: internal/cli/assets/agent.yaml
        dst: /etc/coen/agent.yaml
        type: config|noreplace
        file_info:
          mode: 0640
      - dst: /etc/coen/pki
        type: dir
        file_info:
          mode: 0750
      - dst: /etc/coen/certs
        type: dir
        file_info:
          mode: 0750
      # Drop-in route directories: operators add per-host/per-agent route
      # fragments here and coen merges them onto edge.yaml / agent.yaml.
      - dst: /etc/coen/edge.d
        type: dir
        file_info:
          mode: 0750
      - dst: /etc/coen/agent.d
        type: dir
        file_info:
          mode: 0750
      # Shipped as plain files under /usr/share/doc: goreleaser's bundled nfpm
      # silently drops entries typed "doc", so install these directly.
      - src: packaging/nginx/coen.conf
        dst: /usr/share/doc/coen/examples/nginx-coen.conf
      - src: README.md
        dst: /usr/share/doc/coen/README.md
      - src: LICENSE
        dst: /usr/share/doc/coen/LICENSE
    scripts:
      postinstall: packaging/scripts/postinstall.sh
      preremove: packaging/scripts/preremove.sh
      postremove: packaging/scripts/postremove.sh

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Fixes
      regexp: '^fix'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

release:
  draft: false
  prerelease: auto
