coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%      # allow a small dip without failing the check
    patch:
      default:
        informational: true   # report patch coverage, but don't block PRs

comment:
  layout: "reach, diff, files"
  require_changes: false

# The process entrypoint is a two-line main() that only calls cli.Execute();
# it is exercised by the binary itself, not unit-testable in isolation.
ignore:
  - "cmd/coen"
