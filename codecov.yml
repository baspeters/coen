coverage:
  precision: 1
  round: down
  range: "85...100"        # badge color: red below 85, green toward 100
  status:
    project:
      default:
        target: auto
        threshold: 2%      # allow a small dip without failing the check
    patch:
      default:
        informational: true   # report patch coverage, but don't block PRs

comment:
  layout: "reach, diff, files"
  require_changes: false

# Excluded from coverage scoring (integration-tested, not unit-testable in isolation):
# - cmd/coen: the two-line main() that only calls cli.Execute().
# - internal/cli/run.go: the daemon launch and POSIX-signal wiring (blocking
#   Run loops, SIGHUP/SIGTERM handling), exercised by the e2e and smoke tests.
ignore:
  - "cmd/coen"
  - "internal/cli/run.go"
