# Proxied mode: nginx owns :443 and the certificate; the coen edge runs in
# proxied mode on 127.0.0.1:8000 and receives plain HTTP. Routing by Host still
# happens inside coen (it reads the Host header), so nginx just forwards.

# In the http { } context (enables clean WebSocket upgrades):
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    server_name app.example.com;

    ssl_certificate     /etc/letsencrypt/live/app.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8000;   # coen edge (proxied mode)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;         # coen routes on this
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
