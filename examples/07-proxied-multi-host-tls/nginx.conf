# Multi-host TLS with nginx in front of a multi-agent coen edge.
#
# This is the realistic production shape for several hostnames with distinct
# certificates: nginx does SNI + per-host certs on :443 and forwards every vhost
# to the single coen edge (proxied mode) on 127.0.0.1:8000. coen then routes by
# Host to the owning agent (app -> agent A, api -> agent B; see edge.d/).
#
# Standalone mode can't do per-host certs today (it serves one cert), so
# per-host TLS lives here in nginx. ACME automation is on the roadmap.

# In the http { } context:
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Shared proxy settings -> the coen edge.
upstream coen_edge {
    server 127.0.0.1:8000;
}

server {
    listen 443 ssl;
    server_name app.example.com;

    ssl_certificate     /etc/letsencrypt/live/app.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;

    location / {
        proxy_pass http://coen_edge;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name api.example.com;

    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;

    location / {
        proxy_pass http://coen_edge;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
