edge:
  address: edge.example.com:2636
  ca:   /etc/coen/pki/ca.crt
  cert: /etc/coen/pki/agent.crt
  key:  /etc/coen/pki/agent.key
routes:
  - host: app.example.com
    service: 127.0.0.1:8080
reconnect:
  min_backoff: 1s
  max_backoff: 30s
drain_timeout: 15s
log:
  level: info
  format: text
admin:
  socket: /run/coen/agent.sock
